{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cashmate - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary-color: #0A2E36; /* Azul escuro */
      --secondary-color: #4E878C; /* Azul médio */
      --accent-color: #14CC60;  /* Verde vivo */
      --text-light: #C8C6D7; /* Cinza claro */
      --background-gradient: linear-gradient(135deg, #0A2E36 0%, #4E878C 100%);
      --text-color: var(--text-light);
      --input-bg: #164B4F; /* tom escuro para inputs */
      --border-radius: 12px;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--background-gradient);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(200, 198, 215, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: 0;
    }

    .login-container {
      background-color: var(--primary-color);
      padding: 40px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      gap: 15px;
    }

    /* Removido estilo do SVG, usaremos imagem */

    .logo img {
      width: 50px;
      height: 50px;
      border-radius: var(--border-radius);
      box-shadow: 0 0 10px var(--accent-color);
      object-fit: contain;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-light);
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input[type="text"],
    input[type="password"] {
      background: var(--input-bg);
      border: none;
      padding: 12px 15px;
      margin-bottom: 15px;
      border-radius: var(--border-radius);
      color: var(--text-color);
      box-shadow: inset 0 0 0 1px #346f73;
      font-size: 1rem;
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-light);
      opacity: 0.7;
    }

    input[type="submit"] {
      background: var(--accent-color);
      color: var(--primary-color);
      padding: 12px;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease;
      box-shadow: 0 4px 10px rgba(20, 204, 96, 0.5);
    }

    input[type="submit"]:hover {
      background: #10b94e;
    }

    .google-login {
      background: var(--text-light);
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border-radius: var(--border-radius);
      padding: 12px;
      margin-top: 15px;
      cursor: pointer;
      transition: box-shadow 0.3s ease;
      box-shadow: 0 0 5px rgba(78, 135, 140, 0.5);
    }

    .google-login img {
      width: 20px;
      height: 20px;
      margin-right: 10px;
    }

    .google-login:hover {
      box-shadow: 0 0 0 2px var(--accent-color);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .footer a {
      color: var(--accent-color);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="{% static 'icon_cashmate.png' %}" alt="Logo do Cashmate" />
      <div class="logo-text">Cashmate</div>
    </div>

    <form method="POST" action="/accounts/login/">
      {% csrf_token %}
      <input type="text" name="login" placeholder="Username or Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="submit" value="Login" />
    </form>

    <div class="google-login" onclick="window.location='/accounts/google/login/'">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google logo" />
      Login with Google
    </div>

    <div class="footer">
      <p>Don't have an account? <a href="/accounts/signup/">Sign up</a></p>
    </div>
  </div>
</body>
</html>
